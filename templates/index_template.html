<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palm Ridge Estates — Lot Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#1F3A2E;
    --forest-dark:#152A21;
    --clay:#B85C38;
    --moss:#7A9B76;
    --mustard:#D4A64A;
    --limestone:#EDE7D9;
    --paper:#F7F4EC;
    --ink:#2B2E2A;
    --ink-soft:#5C6259;
    --line:#D9D2C0;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;}
  .app{display:flex;flex-direction:column;height:100vh;}

  /* Top bar */
  .topbar{
    background:var(--forest);
    color:var(--limestone);
    padding:16px 28px;
    display:flex;
    align-items:baseline;
    gap:14px;
    flex-wrap:wrap;
    border-bottom:3px solid var(--clay);
  }
  .topbar .brand{
    font-family:'Fraunces',serif;
    font-size:24px;
    font-weight:600;
    letter-spacing:0.2px;
    color:var(--white);
  }
  .topbar .eyebrow{
    font-size:12.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#B8C9BB;
    font-weight:500;
  }

  /* Layout */
  .body-wrap{flex:1;display:flex;min-height:0;}
  .rail{
    width:320px;
    min-width:280px;
    background:var(--white);
    border-right:1px solid var(--line);
    overflow-y:auto;
    padding:20px 20px 40px;
  }
  .map-wrap{flex:1;position:relative;}
  #map{width:100%;height:100%;background:#dfe6d9;}

  /* Rail sections */
  .rail h2{
    font-family:'Fraunces',serif;
    font-size:15px;
    font-weight:600;
    margin:0 0 12px;
    color:var(--forest);
    text-transform:uppercase;
    letter-spacing:0.05em;
  }
  .section{margin-bottom:28px;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat-card{
    background:var(--limestone);
    border-radius:6px;
    padding:10px 12px;
    border-left:3px solid var(--forest);
  }
  .stat-card .num{
    font-family:'IBM Plex Mono',monospace;
    font-size:19px;
    font-weight:500;
    color:var(--forest-dark);
    display:block;
  }
  .stat-card .label{
    font-size:11px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }

  .legend-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px;}
  .swatch{width:14px;height:14px;border-radius:3px;display:inline-block;flex-shrink:0;}

  label.filter-label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--ink-soft);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:0.03em;
  }
  select, input[type="range"]{
    width:100%;
    padding:7px 8px;
    border:1px solid var(--line);
    border-radius:5px;
    background:var(--paper);
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    color:var(--ink);
    margin-bottom:14px;
  }
  .chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .chip{
    border:1px solid var(--line);
    background:var(--paper);
    padding:5px 11px;
    border-radius:20px;
    font-size:12.5px;
    cursor:pointer;
    color:var(--ink-soft);
    transition:all .15s ease;
  }
  .chip.active{background:var(--forest);color:var(--white);border-color:var(--forest);}
  .price-range-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);margin-bottom:4px;}

  /* AI finder */
  .ai-box{
    background:var(--forest);
    border-radius:8px;
    padding:14px;
    color:var(--limestone);
  }
  .ai-box h2{color:var(--limestone);margin-bottom:8px;}
  .ai-box textarea{
    width:100%;
    min-height:56px;
    border-radius:5px;
    border:1px solid #35513F;
    background:var(--forest-dark);
    color:var(--white);
    padding:8px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    resize:vertical;
    margin-bottom:8px;
  }
  .ai-box button{
    width:100%;
    background:var(--clay);
    color:var(--white);
    border:none;
    padding:9px;
    border-radius:5px;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .ai-box button:hover{background:#A34D2E;}
  .ai-result{
    margin-top:10px;
    font-size:12.5px;
    line-height:1.5;
    color:#DCE7DD;
    display:none;
  }
  .ai-note{font-size:11px;color:#96AB9A;margin-top:8px;line-height:1.4;}

  /* Popup styling */
  .leaflet-popup-content-wrapper{
    background:var(--white);
    border-radius:8px;
  }
  .popup-title{
    font-family:'Fraunces',serif;
    font-size:16px;
    font-weight:600;
    color:var(--forest-dark);
    margin:0 0 6px;
  }
  .popup-status{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
    padding:2px 8px;
    border-radius:12px;
    color:#fff;
    margin-bottom:8px;
  }
  .popup-row{font-size:13px;margin:3px 0;color:var(--ink);}
  .popup-row span{color:var(--ink-soft);}
  .popup-price{
    font-family:'IBM Plex Mono',monospace;
    font-size:15px;
    font-weight:500;
    color:var(--clay);
    margin-top:6px;
  }

  /* Scrollbar */
  .rail::-webkit-scrollbar{width:6px;}
  .rail::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}

  @media (max-width:820px){
    .body-wrap{flex-direction:column;}
    .rail{width:100%;max-height:45vh;border-right:none;border-bottom:1px solid var(--line);}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">Palm Ridge Estates</div>
    <div class="eyebrow">Lipa City, Batangas · Phases 1–3 · Lot Map</div>
  </div>

  <div class="body-wrap">
    <div class="rail">
      <div class="section">
        <h2>Overview</h2>
        <div class="stat-grid" id="statGrid"></div>
      </div>

      <div class="section">
        <h2>Lot Status</h2>
        <div class="legend-row"><span class="swatch" style="background:#7A9B76"></span> Available</div>
        <div class="legend-row"><span class="swatch" style="background:#D4A64A"></span> Reserved</div>
        <div class="legend-row"><span class="swatch" style="background:#B85C38"></span> Sold</div>
      </div>

      <div class="section">
        <h2>Filters</h2>
        <label class="filter-label">Phase</label>
        <div class="chip-row" id="phaseChips"></div>

        <label class="filter-label">Status</label>
        <div class="chip-row" id="statusChips"></div>

        <label class="filter-label">Bedrooms</label>
        <select id="bedroomFilter">
          <option value="any">Any</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4+</option>
        </select>

        <label class="filter-label">Max Price (₱<span id="priceVal"></span>)</label>
        <input type="range" id="priceFilter" min="1000000" max="5000000" step="100000">
      </div>

      <div class="section ai-box">
        <h2>Ask the Lot Finder</h2>
        <textarea id="aiQuery" placeholder="e.g. 3 bedroom corner lot under 3M, close to the entrance"></textarea>
        <button id="aiRun">Find matching lots</button>
        <div class="ai-result" id="aiResult"></div>
        <div class="ai-note">Ranks lots from your filtered data using simple rule-based scoring — swap in the Claude API for true natural-language reasoning.</div>
      </div>
    </div>

    <div class="map-wrap">
      <div id="map"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
const DATA = __DATA_PLACEHOLDER__
;

const STATUS_COLOR = { available:"#7A9B76", reserved:"#D4A64A", sold:"#B85C38" };
const STATUS_LABEL = { available:"Available", reserved:"Reserved", sold:"Sold" };

const map = L.map('map', { zoomControl:true }).setView([13.9425, 121.1638], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:20,
  attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

// lot footprint size in degrees (smaller than grid spacing so plots read as distinct rectangles)
const LOT_W = 0.00006;
const LOT_H = 0.00005;

let lotLayers = {};
let currentFilters = { phase:"all", status:"all", bedroom:"any", maxPrice:5000000 };

function fmtPHP(n){
  return "₱" + n.toLocaleString("en-US");
}

function passesFilter(lot){
  if(currentFilters.phase !== "all" && String(lot.phase) !== currentFilters.phase) return false;
  if(currentFilters.status !== "all" && lot.status !== currentFilters.status) return false;
  if(currentFilters.bedroom !== "any"){
    if(currentFilters.bedroom === "4"){ if(lot.bedrooms < 4) return false; }
    else if(String(lot.bedrooms) !== currentFilters.bedroom) return false;
  }
  if(lot.price_php > currentFilters.maxPrice) return false;
  return true;
}

function renderLots(){
  Object.values(lotLayers).forEach(l => map.removeLayer(l));
  lotLayers = {};

  DATA.lots.forEach(lot => {
    const visible = passesFilter(lot);
    const bounds = [
      [lot.lat - LOT_H/2, lot.lng - LOT_W/2],
      [lot.lat + LOT_H/2, lot.lng + LOT_W/2]
    ];
    const rect = L.rectangle(bounds, {
      color: "#5C6259",
      weight: 0.6,
      fillColor: STATUS_COLOR[lot.status],
      fillOpacity: visible ? 0.88 : 0.12,
      opacity: visible ? 1 : 0.15
    });

    const popupHtml = `
      <div class="popup-title">${lot.lot_id}</div>
      <div class="popup-status" style="background:${STATUS_COLOR[lot.status]}">${STATUS_LABEL[lot.status]}</div>
      <div class="popup-row"><span>Phase / Block:</span> ${lot.phase} / ${lot.block}</div>
      <div class="popup-row"><span>Type:</span> ${lot.lot_type}</div>
      <div class="popup-row"><span>Area:</span> ${lot.area_sqm} sqm</div>
      <div class="popup-row"><span>Bedrooms:</span> ${lot.bedrooms}</div>
      <div class="popup-row"><span>To entrance:</span> ${lot.distance_to_entrance_m} m</div>
      <div class="popup-price">${fmtPHP(lot.price_php)}</div>
    `;
    rect.bindPopup(popupHtml);
    if(visible) rect.addTo(map);
    lotLayers[lot.lot_id] = rect;
  });

  updateStats();
}

// Amenities
DATA.amenities.forEach(a => {
  const icon = L.divIcon({
    className: '',
    html: `<div style="background:#1F3A2E;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3);">★</div>`,
    iconSize:[26,26], iconAnchor:[13,13]
  });
  L.marker([a.lat, a.lng], {icon}).addTo(map).bindPopup(`<strong>${a.name}</strong><br><span style="color:#5C6259;font-size:12px;">${a.type}</span>`);
});

function updateStats(){
  const visibleLots = DATA.lots.filter(passesFilter);
  const total = DATA.lots.length;
  const sold = DATA.lots.filter(l=>l.status==="sold").length;
  const totalRevenue = DATA.lots.filter(l=>l.status==="sold").reduce((s,l)=>s+l.price_php,0);
  const avgPsqm = Math.round(DATA.lots.reduce((s,l)=>s+l.price_per_sqm,0) / total);
  const pctSold = Math.round((sold/total)*100);

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card"><span class="num">${total}</span><span class="label">Total Lots</span></div>
    <div class="stat-card"><span class="num">${pctSold}%</span><span class="label">Sold</span></div>
    <div class="stat-card"><span class="num">${fmtPHP(avgPsqm)}</span><span class="label">Avg ₱/sqm</span></div>
    <div class="stat-card"><span class="num">${(totalRevenue/1e6).toFixed(1)}M</span><span class="label">Revenue (sold)</span></div>
    <div class="stat-card" style="grid-column:1/-1;"><span class="num">${visibleLots.length}</span><span class="label">Matching current filters</span></div>
  `;
}

// Filter chip builders
function buildChips(containerId, values, labels, key, allowAll=true){
  const container = document.getElementById(containerId);
  const options = allowAll ? ["all", ...values] : values;
  options.forEach(v => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (v === currentFilters[key] ? ' active' : '');
    chip.textContent = labels[v] || v;
    chip.onclick = () => {
      currentFilters[key] = v;
      [...container.children].forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      renderLots();
    };
    container.appendChild(chip);
  });
}

buildChips('phaseChips', ["1","2","3"], {all:"All", "1":"Phase 1","2":"Phase 2","3":"Phase 3"}, 'phase');
buildChips('statusChips', ["available","reserved","sold"], {all:"All", available:"Available", reserved:"Reserved", sold:"Sold"}, 'status');

document.getElementById('bedroomFilter').addEventListener('change', e => {
  currentFilters.bedroom = e.target.value;
  renderLots();
});

const priceFilter = document.getElementById('priceFilter');
priceFilter.value = 5000000;
document.getElementById('priceVal').textContent = (5000000).toLocaleString('en-US');
priceFilter.addEventListener('input', e => {
  currentFilters.maxPrice = Number(e.target.value);
  document.getElementById('priceVal').textContent = currentFilters.maxPrice.toLocaleString('en-US');
  renderLots();
});

// AI lot finder — calls the real Claude API via a Vercel serverless proxy.
// The proxy holds the API key server-side; see /palm-ridge-api in the repo.
const LOT_FINDER_API_URL = "__LOT_FINDER_API_URL__"; // e.g. https://palm-ridge-api.vercel.app/api/lot-finder

document.getElementById('aiRun').addEventListener('click', async () => {
  const query = document.getElementById('aiQuery').value.trim();
  const resultBox = document.getElementById('aiResult');
  const runButton = document.getElementById('aiRun');

  if (!query) return;

  const candidates = DATA.lots.filter(passesFilter).filter(l => l.status === "available");

  resultBox.style.display = 'block';
  resultBox.innerHTML = "Thinking...";
  runButton.disabled = true;

  let top = [];
  try {
    const res = await fetch(LOT_FINDER_API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, lots: candidates })
    });

    if (!res.ok) throw new Error("API error " + res.status);
    const data = await res.json();

    top = (data.matches || [])
      .map(id => candidates.find(l => l.lot_id === id))
      .filter(Boolean);

    resultBox.innerHTML = data.explanation || "Here's what I found.";
    if (top.length > 0) {
      resultBox.innerHTML += "<br><br>" + top.map(l =>
        `• <strong>${l.lot_id}</strong> — ${l.bedrooms}BR, ${l.area_sqm}sqm, ${fmtPHP(l.price_php)}, ${l.distance_to_entrance_m}m to entrance`
      ).join("<br>");
    }
  } catch (err) {
    console.error(err);
    resultBox.innerHTML = "Sorry, the lot finder is temporarily unavailable. (Is the API proxy deployed and reachable?)";
  } finally {
    runButton.disabled = false;
  }

  if (top.length === 0) {
    // nothing further to highlight
  } else {
    // highlight on map
    top.forEach(l => {
      const layer = lotLayers[l.lot_id];
      if (layer) {
        layer.setStyle({ color:"#1F3A2E", weight:3 });
        layer.openPopup();
      }
    });
    map.panTo([top[0].lat, top[0].lng]);
  }
});

renderLots();
</script>
</body>
</html>
